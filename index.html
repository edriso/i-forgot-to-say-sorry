<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I forgot to say SORRY</title>
  <link rel="stylesheet" href="assets/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.13/html-to-image.js" integrity="sha512-4W7+nCTcMQMFBnTRwvixN7il649NCqZiBfJ7WvzU7gxF12zOnaKwVYTSIzwrjy/cy+CPQxn2lAIVZIes+rPp2Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>
  <header>
    <h1>I forgot to say SORRY <span class="logo">🙏</span></h1>
  </header>

  <main class="container">
    <div class="apology-card" id="apologyCard">
      <textarea name="apology" id="apology" autofocus placeholder="Write your apology here..."></textarea>
    </div>

    <div class="sticker-picker">
      <p class="sticker-label">Add stickers:</p>
      <div class="sticker-options">
        <button class="sticker-option" data-sticker="😢">😢</button>
        <button class="sticker-option" data-sticker="😭">😭</button>
        <button class="sticker-option" data-sticker="🥺">🥺</button>
        <button class="sticker-option" data-sticker="💔">💔</button>
        <button class="sticker-option" data-sticker="🙏">🙏</button>
        <button class="sticker-option" data-sticker="❤️">❤️</button>
        <button class="sticker-option" data-sticker="🫂">🫂</button>
        <button class="sticker-option" data-sticker="💐">💐</button>
        <button class="sticker-option" data-sticker="🌹">🌹</button>
        <button class="sticker-option" data-sticker="🕊️">🕊️</button>
        <button class="sticker-option" data-sticker="✨">✨</button>
        <button class="sticker-option" data-sticker="🤍">🤍</button>
      </div>
    </div>

    <button class="generate-btn">Generate Apology Image</button>
  </main>

  <script src="assets/script.js"></script>
</body>
</html>
